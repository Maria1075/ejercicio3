<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Security-Policy"
          content="default-src 'self'; script-src 'self' 'unsafe-eval' 'unsafe-inline' https://cdn.jsdelivr.net; style-src 'self' https://cdn.jsdelivr.net; img-src 'self' data:; font-src 'self' https://cdn.jsdelivr.net;">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Canciones</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN"
        crossorigin="anonymous"
    >
    <link href="css/styles.css" rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-dark bg-dark mb-5">
        <div class="container">
            <span class="navbar-brand fw-bold fs-4">Gestión de Canciones</span>
        </div>
    </nav>

    <div class="container">
        <div class="row g-4">

            <!-- ── Formulario ── -->
            <div class="col-lg-5">
                <div class="card shadow-sm">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Añadir Canción</h5>
                    </div>
                    <div class="card-body">
                        <form id="cancionForm" novalidate>

                            <div class="mb-3">
                                <label for="titulo" class="form-label">
                                    Título <span class="text-danger">*</span>
                                </label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="titulo"
                                    name="titulo"
                                    placeholder="Nombre de la canción"
                                    autocomplete="off"
                                >
                                <div id="tituloError" class="text-danger small mt-1" aria-live="polite"></div>
                                <div class="form-text">Máximo 200 caracteres</div>
                            </div>

                            <div class="mb-3">
                                <label for="artista" class="form-label">
                                    Artista <span class="text-danger">*</span>
                                </label>
                                <input
                                    type="text"
                                    class="form-control"
                                    id="artista"
                                    name="artista"
                                    placeholder="Nombre del artista o grupo"
                                    autocomplete="off"
                                >
                                <div id="artistaError" class="text-danger small mt-1" aria-live="polite"></div>
                                <div class="form-text">Máximo 120 caracteres</div>
                            </div>

                            <div class="mb-4">
                                <label for="duracion" class="form-label">
                                    Duración (segundos) <span class="text-danger">*</span>
                                </label>
                                <input
                                    type="number"
                                    class="form-control"
                                    id="duracion"
                                    name="duracion"
                                    placeholder="Ej: 240"
                                    min="1"
                                    step="1"
                                >
                                <div id="duracionError" class="text-danger small mt-1" aria-live="polite"></div>
                                <div class="form-text">Entre 1 y 3600 segundos (máximo 60 minutos)</div>
                            </div>

                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary" id="submitBtn">
                                    Añadir Canción
                                </button>
                                <button type="button" class="btn btn-outline-secondary" id="clearBtn">
                                    Limpiar Formulario
                                </button>
                            </div>

                        </form>
                    </div>
                </div>
            </div>

            <!-- ── Lista de canciones ── -->
            <div class="col-lg-7">

                <div id="alertContainer" class="mb-3"></div>

                <div class="d-flex align-items-center justify-content-between mb-3">
                    <h5 class="mb-0">
                        Lista de Canciones
                        <span class="badge bg-secondary ms-1" id="totalCanciones">0</span>
                    </h5>
                </div>

                <div id="emptyMessage" class="text-center text-muted py-5 border rounded bg-white">
                    <p class="mb-1 fs-5">No hay canciones en la lista.</p>
                    <small>Añade la primera canción usando el formulario.</small>
                </div>

                <div class="table-responsive d-none" id="tableContainer">
                    <table class="table table-striped table-hover align-middle shadow-sm" id="cancionesTable">
                        <thead class="table-dark">
                            <tr>
                                <th scope="col" style="width:3rem">#</th>
                                <th scope="col">Título</th>
                                <th scope="col">Artista</th>
                                <th scope="col" style="width:9rem">Duración (seg.)</th>
                                <th scope="col" style="width:7rem">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="cancionesBody">
                        </tbody>
                    </table>
                </div>

            </div>
        </div>
    </div>

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"
    ></script>
    <script src="js/app.js"></script>

</body>
</html>
